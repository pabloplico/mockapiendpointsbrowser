<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo app — MockGen</title>
<style>
  :root {
    --bg: #0e1014;
    --panel: #171a21;
    --border: #2a2f3a;
    --text: #e6e8ec;
    --muted: #8a92a3;
    --accent: #6ea8ff;
    --green: #5dd39e;
    --red: #ff6b6b;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; line-height: 1.5; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 28px 24px 80px; }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { color: var(--muted); margin-bottom: 24px; }
  .sub a { color: var(--accent); }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  input, button, select { font: inherit; color: var(--text); background: #0e1014; border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; }
  input { flex: 1; font-family: var(--mono); font-size: 13px; }
  button { background: #4f8ef7; border-color: #4f8ef7; color: white; cursor: pointer; }
  button:hover { filter: brightness(1.1); }
  pre { background: #0e1014; border: 1px solid var(--border); border-radius: 6px; padding: 12px; max-height: 360px; overflow: auto; font-family: var(--mono); font-size: 12px; margin: 0; white-space: pre-wrap; word-break: break-word; }
  .status { font-family: var(--mono); font-size: 12px; margin-top: 8px; }
  .status .hit { color: var(--green); }
  .status .miss { color: var(--muted); }
  .status .err { color: var(--red); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Demo app</h1>
  <div class="sub">This page simulates your real app. Define mocks in <a href="/mockgen.html">MockGen</a>, then fetch them here.</div>

  <div class="card">
    <div class="row">
      <select id="method">
        <option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option>
      </select>
      <input id="path" value="/api/users" spellcheck="false">
      <button id="go">Fetch</button>
    </div>
    <pre id="out">Click Fetch to call the endpoint above.</pre>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
  const out = document.getElementById('out');
  const status = document.getElementById('status');
  document.getElementById('go').addEventListener('click', async () => {
    const method = document.getElementById('method').value;
    const path = document.getElementById('path').value.trim();
    out.textContent = 'Loading…';
    status.innerHTML = '';
    try {
      const t0 = performance.now();
      const res = await fetch(path, { method });
      const ms = Math.round(performance.now() - t0);
      const hit = res.headers.get('X-MockGen') === 'hit';
      const text = await res.text();
      try { out.textContent = JSON.stringify(JSON.parse(text), null, 2); }
      catch { out.textContent = text; }
      status.innerHTML = hit
        ? `<span class="hit">✓ served by MockGen</span> · ${res.status} · ${ms}ms`
        : `<span class="miss">network response (no mock defined for ${method} ${path})</span> · ${res.status} · ${ms}ms`;
    } catch (err) {
      out.textContent = '';
      status.innerHTML = `<span class="err">fetch failed: ${err.message}</span>`;
    }
  });
</script>
</body>
</html>
